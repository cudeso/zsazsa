{# Manual collection source fields. Expects `src` (a source namespace) or None,
   plus `admiralty_options` in context. Shared by the inline edit rows and the
   new-source template. #}
{% set _src = src if src is defined else None %}
<div class="row g-2">
  <div class="col-md-6">
    <label class="form-label small mb-1">Name <span class="text-danger">*</span></label>
    <input type="text" name="name" class="form-control form-control-sm" value="{{ _src.name if _src else '' }}"
           placeholder="e.g. Weekly sector newsletter" required>
  </div>
  <div class="col-md-6">
    <label class="form-label small mb-1">Owner</label>
    <input type="text" name="owner" class="form-control form-control-sm" value="{{ _src.owner if _src else '' }}"
           placeholder="Person or team responsible for monitoring this source">
  </div>
  <div class="col-md-6">
    <label class="form-label small mb-1">Location</label>
    <input type="text" name="location" class="form-control form-control-sm" value="{{ _src.location if _src else '' }}"
           placeholder="URL, file path, or physical location">
  </div>
  <div class="col-md-6">
    <label class="form-label small mb-1">Source reliability (Admiralty scale)</label>
    <select name="source_reliability" class="form-select form-select-sm">
      <option value="">- not rated -</option>
      {% for code, label in admiralty_options %}
      <option value="{{ code }}" {{ 'selected' if _src and _src.source_reliability == code }}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-12">
    <label class="form-label small mb-1">Description</label>
    <textarea name="description" class="form-control form-control-sm" rows="2"
              placeholder="What this source covers and why it is relevant">{{ _src.description if _src else '' }}</textarea>
  </div>
</div>
