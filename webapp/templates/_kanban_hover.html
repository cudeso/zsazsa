{# Two-way hover highlight between a list table row (.req-row[data-req-id]) and
   its matching status-board card (.kanban-card[data-id]): hovering either one
   highlights the other. Shared by the PIR, GIR and RFI list pages. The
   .req-hover styles live in app.css. #}
<script>
(function() {
  function link(a, b) {
    if (!a || !b) return;
    a.addEventListener('mouseenter', function() { b.classList.add('req-hover'); });
    a.addEventListener('mouseleave', function() { b.classList.remove('req-hover'); });
  }
  document.querySelectorAll('.req-row').forEach(function(row) {
    link(row, document.querySelector('.kanban-card[data-id="' + row.dataset.reqId + '"]'));
  });
  document.querySelectorAll('.kanban-card[data-id]').forEach(function(card) {
    link(card, document.querySelector('.req-row[data-req-id="' + card.dataset.id + '"]'));
  });
})();
</script>
