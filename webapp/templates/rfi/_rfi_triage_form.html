{# Inline RFI triage form. Expects `rfi` and `triage_checklist` (list of
   (value, label) tuples). #}
<form method="post" action="{{ url_for('rfi.rfi_triage', id=rfi.id) }}" class="triage-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="row g-4">
    <div class="col-lg-6">
      <div class="small fw-semibold mb-2"><i class="fas fa-clipboard-check me-1"></i>Triage checklist</div>
      {% set saved = rfi.triage_checklist or [] %}
      {% for value, label in triage_checklist %}
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" name="triage_checklist" value="{{ value }}"
               id="rfi-chk-{{ rfi.id }}-{{ loop.index }}" {{ 'checked' if value in saved }}>
        <label class="form-check-label small" for="rfi-chk-{{ rfi.id }}-{{ loop.index }}">{{ label }}</label>
      </div>
      {% endfor %}
    </div>
    <div class="col-lg-6">
      <div class="small fw-semibold mb-2"><i class="fas fa-gavel me-1"></i>Decision</div>
      <div class="form-check">
        <input class="form-check-input triage-decision" type="radio" name="decision" value="acknowledge"
               id="rfi-dec-{{ rfi.id }}-ack" required>
        <label class="form-check-label small" for="rfi-dec-{{ rfi.id }}-ack">
          <strong>Acknowledge</strong>
          <span class="text-muted d-block">Accept the request. Moves to Acknowledged.</span>
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input triage-decision" type="radio" name="decision" value="reject"
               id="rfi-dec-{{ rfi.id }}-reject" required data-needs-reason="1">
        <label class="form-check-label small" for="rfi-dec-{{ rfi.id }}-reject">
          <strong>Reject</strong>
          <span class="text-muted d-block">Out of scope or not actionable. Closes the RFI. Reason required.</span>
        </label>
      </div>
      <div class="mt-2 triage-reason-wrap" style="display:none;">
        <label class="form-label small mb-1">Reason</label>
        <textarea name="reason" class="form-control form-control-sm" rows="2" placeholder="Explain the decision to the requester."></textarea>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-sm btn-primary"><i class="fas fa-check me-1"></i>Confirm decision</button>
      </div>
    </div>
  </div>
</form>
