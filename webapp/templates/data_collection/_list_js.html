<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
.tag-cell-inner { display:flex;flex-direction:column;gap:.25rem; }
.tag-line { display:flex;flex-wrap:wrap;gap:.2rem;align-items:center; }
.tag-line:empty { display:none; }
.tag-row-badge { font-size:.62rem !important; padding:.15rem .4rem !important; }
#go-to-top-btn {
  position:fixed; bottom:1.75rem; right:1.5rem; z-index:1030;
  opacity:0; transform:translateY(10px);
  transition:opacity .22s, transform .22s;
  pointer-events:none;
  box-shadow:var(--shadow-float);
}
#go-to-top-btn.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
.source-toggle {
  display:inline-flex; align-items:center; gap:.45rem;
  padding:.4rem .75rem; border:2px solid var(--neutral-300); border-radius:.5rem;
  cursor:pointer; background:var(--card-bg); transition:border-color .12s, background .12s;
  user-select:none; font-size:.85rem;
}
.source-toggle:hover { border-color:var(--accent-blue); background:var(--source-toggle-hover-bg); }
.source-toggle-on { border-color:var(--accent-blue); background:var(--source-toggle-on-bg); color:var(--pill-active-fg); font-weight:600; }
.source-toggle-on .source-toggle-icon { color:var(--accent-blue); }
.source-toggle-err { border-color:var(--source-toggle-err-border); }
.source-toggle-err.source-toggle-on { background:var(--source-toggle-err-bg); }
.source-toggle-icon { font-size:.9rem; color:var(--neutral-600); }
.source-toggle-badge { font-size:.65rem; padding:.15rem .35rem; border-radius:.25rem; }
.tag-pill {
  display:inline-block; padding:.15rem .45rem; border-radius:999px;
  font-size:.7rem; font-weight:500; border:1.5px solid var(--neutral-300);
  background:var(--neutral-50); color:var(--neutral-700); cursor:pointer; transition:all .12s;
}
.tag-pill:hover { border-color:var(--neutral-500); background:var(--neutral-200); }
.tag-pill-include { background:var(--tag-include-bg); border-color:var(--tag-include-border); color:var(--tag-include-fg); }
.tag-pill-include:hover { background:var(--tag-include-hover-bg); }
.tag-pill-exclude { background:var(--tag-exclude-bg); border-color:var(--tag-exclude-border); color:var(--tag-exclude-fg); }
.tag-pill-exclude:hover { background:var(--tag-exclude-hover-bg); }
.tag-pill-hidden { display:none !important; }
.sort-btn.active, .date-filter-btn.active { background:var(--accent-blue); border-color:var(--accent-blue); color:var(--text-on-accent); }
.wf-badge { border:1px solid; font-weight:600; }
.wf-draft     { background:var(--wf-draft-bg); color:var(--neutral-600); border-color:var(--neutral-400); }
.wf-incomplete{ background:var(--wf-incomplete-bg); color:var(--wf-incomplete-fg); border-color:var(--wf-incomplete-border); }
.wf-ongoing   { background:var(--wf-ongoing-bg); color:var(--wf-ongoing-fg); border-color:var(--wf-ongoing-border); }
.wf-complete  { background:var(--wf-complete-bg); color:var(--wf-complete-fg); border-color:var(--wf-complete-border); }
.wf-published { background:var(--wf-published-bg); color:var(--wf-published-fg); border-color:var(--wf-published-border); }
.wf-other     { background:var(--neutral-200); color:var(--neutral-700); border-color:var(--neutral-300); }
.wf-rejected-row { opacity:.45; }
.wf-rejected-row:hover { opacity:.8; }
.briefing-excluded-row { opacity:.4; filter:grayscale(.6); }
.briefing-excluded-row:hover { opacity:.75; filter:none; }
.cti-pred-row {
  display:flex; align-items:center; gap:.6rem;
  padding:.4rem .2rem; border-bottom:1px solid var(--border-faint);
}
.cti-pred-label { flex:0 0 9.5rem; min-width:9.5rem; }
.cti-pred-desc { display:block; font-size:.7rem; line-height:1.2; margin-top:.1rem; }
</style>

<script>
if (window.marked) { marked.setOptions({ breaks: true, gfm: true }); }
(function() {
  'use strict';

  var allSourceIds = {{ sources | map(attribute='id') | list | tojson }};
  var followupTag = {{ followup_tag | tojson }};

  var VALUE_CHIP_CONFIG = {{ VALUE_CHIP_CONFIG | tojson }};
  var CLOUD_HIDDEN_PREFIXES = Object.keys(VALUE_CHIP_CONFIG).filter(function(k) {
    return VALUE_CHIP_CONFIG[k].cloud_hide;
  }).concat(['workflow:state', 'retention'])
    .concat({{ collection_tag_hide_prefixes | tojson }});

  var CTI_EVAL_RANK = {
    'very-low': 1, 'low': 2, 'moderate': 3, 'high': 4, 'very-high': 5,
  };

  var _filterStatePersistReady = false;

  var state = {
    q: '',
    include: new Set(),
    exclude: new Set(),
    sortCol: 'date',
    sortDir: 'desc',
    activeSources: new Set(allSourceIds),
    includeOrgs: new Set(),
    excludeOrgs: new Set(),
    displayLimit: 100,
    hideRejected: true,
    flagFilter: 'any',
    pendingRejectUuids: null,
    dateFilter: 'none',
    aiFilter: 'any',
    reportsFilter: 'any',
    reqMatchFilter: 'any',
    vulnFilter: 'any',
    anyProductFilter: false,
    ctiPredicate: '',
    ctiOperator: 'gte',
    ctiValue: 'moderate',
  };

  var CTI_EVAL_CLASSES = ['cti-eval-very-high', 'cti-eval-high', 'cti-eval-moderate', 'cti-eval-low', 'cti-eval-very-low'];

  function _ctiEvalClass(value) {
    if (['very-high', 'high', 'moderate', 'low'].includes(value)) return 'cti-eval-' + value;
    return 'cti-eval-very-low';
  }

  function _applyCtiBadgeClass(badge, tag) {
    if (!badge || !tag || !tag.startsWith('cti-evaluation:')) return;
    var raw = tag.slice('cti-evaluation:'.length);
    var sepIdx = raw.indexOf('=');
    var value = sepIdx >= 0 ? raw.slice(sepIdx + 1).replace(/"/g, '').toLowerCase() : '';
    badge.classList.remove.apply(badge.classList, CTI_EVAL_CLASSES);
    badge.classList.add(_ctiEvalClass(value));
  }

  function _formatCtiEvalTag(tag) {
    var raw = (tag || '').slice('cti-evaluation:'.length);
    var sepIdx = raw.indexOf('=');
    var predicate = sepIdx >= 0 ? raw.slice(0, sepIdx) : raw;
    var value = sepIdx >= 0 ? raw.slice(sepIdx + 1).replace(/"/g, '') : '';
    var cap = function(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; };
    return {
      predicateLabel: predicate.split('-').map(cap).join(' '),
      valueLabel: value.split('-').map(cap).join(' '),
    };
  }

  function ctiEvalMap(tags) {
    var out = {};
    (tags || []).forEach(function(t) {
      if (!t || !t.startsWith('cti-evaluation:')) return;
      var raw = t.slice('cti-evaluation:'.length);
      var sepIdx = raw.indexOf('=');
      if (sepIdx < 0) return;
      var predicate = raw.slice(0, sepIdx).trim().toLowerCase();
      var value = raw.slice(sepIdx + 1).replace(/"/g, '').trim().toLowerCase();
      if (!CTI_EVAL_RANK[value]) return;
      out[predicate] = value;
    });
    return out;
  }

  function getDateCutoff(filter) {
    var d = new Date();
    if (filter === '48h' || filter === 'older-48h') { d.setDate(d.getDate() - 2); }
    else if (filter === '7d' || filter === 'older-7d') { d.setDate(d.getDate() - 7); }
    return d.toISOString().slice(0, 10);
  }

  /* ── Source toggles ── */
  function setSourceActive(srcId, active) {
    var cb = document.querySelector('#source-cb-container .source-cb[value="' + srcId + '"]');
    if (cb) cb.checked = active;
    if (active) { state.activeSources.add(srcId); }
    else { state.activeSources.delete(srcId); }
    sessionStorage.setItem('zsazsa_active_sources', JSON.stringify(Array.from(state.activeSources)));
    syncAllSourceVisuals();
    updateOrgPillVisibility();
    applyAll();
  }

  function syncAllSourceVisuals() {
    document.querySelectorAll('#style-current .source-toggle').forEach(function(el) {
      el.classList.toggle('source-toggle-on', state.activeSources.has(el.dataset.sourceId));
    });
  }

  document.querySelectorAll('#style-current .source-toggle').forEach(function(el) {
    el.addEventListener('click', function() {
      setSourceActive(el.dataset.sourceId, !state.activeSources.has(el.dataset.sourceId));
    });
  });
  syncAllSourceVisuals();

  /* ── Refresh cache button ── */
  var refreshBtn = document.getElementById('refresh-btn');
  var refreshCountdown = document.getElementById('refresh-countdown');

  function fmtCountdown(secs) {
    if (secs <= 0) return 'refresh due';
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    s = s - (s % 10);
    return 'next in ' + m + 'm ' + (s < 10 ? '0' : '') + s + 's';
  }

  // An automatic refresh reloads the page ~4s after firing, but the worker may
  // not have updated last_fetch by then, so the reloaded page can read "due"
  // again. This grace window (stored across the reload) keeps a single auto
  // refresh from turning into a reload loop while the worker catches up.
  var AUTO_REFRESH_GRACE_S = 90;
  function autoRefreshAllowed() {
    try {
      var last = parseFloat(sessionStorage.getItem('dcAutoRefreshAt') || '0');
      return (Date.now() / 1000) - last > AUTO_REFRESH_GRACE_S;
    } catch (e) { return true; }
  }

  // Trigger a cache refresh, reset the countdown and reload. Shared by the
  // manual button and the automatic refresh when the countdown reaches zero.
  var refreshInProgress = false;
  function doRefresh(isAuto) {
    if (refreshInProgress) return;
    refreshInProgress = true;
    if (isAuto) { try { sessionStorage.setItem('dcAutoRefreshAt', String(Date.now() / 1000)); } catch (e) {} }
    if (refreshBtn) {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Refreshing…';
    }
    var csrf = document.querySelector('meta[name="csrf-token"]');
    var headers = {'Content-Type': 'application/x-www-form-urlencoded'};
    if (csrf) headers['X-CSRF-Token'] = csrf.content;
    fetch('{{ url_for("data_collection.refresh") }}', {method:'POST', headers:headers})
      .then(function(resp) {
        if (!resp.ok) throw new Error('refresh-request-failed');
        return resp.json();
      })
      .then(function(payload) {
        if (!payload || !payload.ok) throw new Error('refresh-not-queued');
        if (refreshBtn) refreshBtn.innerHTML = '<i class="fas fa-check me-1"></i> Refresh started';
        if (refreshCountdown && refreshCountdown._resetTimer) refreshCountdown._resetTimer();
        setTimeout(function() { window.location.reload(); }, 4000);
      })
      .catch(function() {
        refreshInProgress = false;
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.innerHTML = '<i class="fas fa-arrows-rotate me-1"></i> Refresh cache';
        }
        // Manual click warns the user; an automatic attempt stays quiet and
        // simply retries on the next tick.
        if (!isAuto) alert('Could not trigger cache refresh. Please retry.');
      });
  }

  if (refreshCountdown) {
    var intervalS = parseInt(refreshCountdown.dataset.intervalS, 10) || 0;
    var lastFetch = parseFloat(refreshCountdown.dataset.lastFetch);
    var nextAt = (!isNaN(lastFetch) && lastFetch > 0 && intervalS > 0)
      ? (lastFetch + intervalS) : null;

    function tickCountdown() {
      if (!nextAt) { refreshCountdown.textContent = ''; return; }
      var secs = Math.round(nextAt - (Date.now() / 1000));
      refreshCountdown.textContent = fmtCountdown(secs);
      // Timer ran out: refresh automatically, exactly as a manual click would.
      if (secs <= 0 && !refreshInProgress && autoRefreshAllowed()) doRefresh(true);
    }
    tickCountdown();
    setInterval(tickCountdown, 10000);
    refreshCountdown._resetTimer = function() {
      if (intervalS > 0) { nextAt = (Date.now() / 1000) + intervalS; tickCountdown(); }
    };
  }

  var refreshInfo = document.getElementById('refresh-info');
  if (refreshInfo && window.bootstrap && bootstrap.Popover) {
    new bootstrap.Popover(refreshInfo);
  }

  if (refreshBtn) {
    refreshBtn.addEventListener('click', function() { doRefresh(false); });
  }

  /* ── Core filter + sort engine ── */
  var rows = Array.from(document.querySelectorAll('#events-tbody .event-row'));

  function bindTagBadgeClick(badge) {
    if (!badge || badge.dataset.boundTagClick === '1') return;
    badge.dataset.boundTagClick = '1';
    badge.addEventListener('click', function(e) {
      e.preventDefault();
      var tag = badge.dataset.tag;
      if (tag && tag.startsWith('zsazsa:product=')) {
        var row = badge.closest('tr');
        var uuid = row ? row.dataset.uuid : null;
        if (uuid) { showUsedInModal(uuid); return; }
      }
      if (state.include.has(tag)) { state.include.delete(tag); }
      else { state.include.add(tag); state.exclude.delete(tag); }
      var isMeta = CLOUD_HIDDEN_PREFIXES.some(function(pfx) { return tag.startsWith(pfx); });
      document.querySelectorAll('.tag-pill:not(.org-pill)').forEach(function(pill) {
        if (pill.dataset.tag !== tag) return;
        pill.dataset.state = state.include.has(tag) ? 'include' : 'neutral';
        pill.className = 'tag-pill ' + (state.include.has(tag) ? 'tag-pill-include' : 'tag-pill-neutral') + (isMeta ? ' tag-pill-hidden' : '');
      });
      updateTagSummary(); applyAll();
    });
  }

  function showUsedInModal(uuid) {
    var body = document.getElementById('used-in-modal-body');
    body.innerHTML = '<div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin me-1"></i> Loading…</div>';
    new bootstrap.Modal(document.getElementById('used-in-modal')).show();
    fetch(SCRIPT_ROOT + '/api/collection/' + uuid + '/used-in')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.ok || !data.products || data.products.length === 0) {
          body.innerHTML = '<p class="text-muted mb-0">No products found that reference this event.</p>';
          return;
        }
        var icons = {'daily-briefing':'fa-newspaper','flash-intel':'fa-bolt','vea':'fa-shield-halved'};
        var html = '<ul class="list-group list-group-flush">';
        data.products.forEach(function(p) {
          var icon = icons[p.type] || 'fa-box-open';
          html += '<li class="list-group-item px-0"><a href="' + p.url + '" class="d-flex align-items-center gap-2 text-decoration-none">' +
            '<i class="fas ' + icon + ' text-secondary fa-fw"></i><span>' + (p.title || p.type) + '</span>' +
            (p.date ? '<span class="text-muted small ms-auto">' + p.date + '</span>' : '') + '</a></li>';
        });
        html += '</ul>';
        body.innerHTML = html;
      })
      .catch(function() { body.innerHTML = '<p class="text-danger mb-0">Failed to load product links.</p>'; });
  }

  function bindProductFilterBtnClick(btn) {
    if (!btn || btn.dataset.boundFilterClick === '1') return;
    btn.dataset.boundFilterClick = '1';
    btn.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      var tag = btn.dataset.tag;
      if (!tag) return;
      var active;
      if (state.include.has(tag)) { state.include.delete(tag); active = false; }
      else { state.include.add(tag); state.exclude.delete(tag); active = true; }
      btn.classList.toggle('active', active);
      document.querySelectorAll('.tag-pill:not(.org-pill)').forEach(function(pill) {
        if (pill.dataset.tag !== tag) return;
        pill.dataset.state = active ? 'include' : 'neutral';
        pill.className = active ? 'tag-pill tag-pill-include' : 'tag-pill tag-pill-neutral';
      });
      updateTagSummary(); applyAll();
    });
  }

  function bindProductMainBtnClick(btn) {
    if (!btn || btn.dataset.boundMainClick === '1') return;
    btn.dataset.boundMainClick = '1';
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      var row = btn.closest('tr');
      var uuid = row ? row.dataset.uuid : null;
      if (uuid) showUsedInModal(uuid);
    });
  }

  document.querySelectorAll('.product-tag-filter-btn').forEach(bindProductFilterBtnClick);
  document.querySelectorAll('.product-tag-main-btn').forEach(bindProductMainBtnClick);

  function ensureCtiBadgeContainer(row) {
    if (!row) return null;
    var titleCell = row.children[3];
    if (!titleCell) return null;
    var container = titleCell.querySelector('.tag-cell-inner');
    if (!container) {
      container = document.createElement('div');
      container.className = 'tag-cell-inner mt-1';
      var titleLink = titleCell.querySelector('.event-preview-link');
      if (titleLink) titleLink.insertAdjacentElement('afterend', container);
      else titleCell.appendChild(container);
    }
    return container;
  }

  function buildCtiBadge(tag) {
    var fmt = _formatCtiEvalTag(tag);
    var badge = document.createElement('span');
    badge.className = 'badge tag-row-badge me-1';
    badge.dataset.tag = tag;
    badge.style.cursor = 'pointer';
    badge.title = 'CTI evaluation · ' + fmt.predicateLabel + ': ' + fmt.valueLabel + ' · Click to filter';
    badge.innerHTML = '<i class="fas fa-microscope fa-xs me-1"></i>' + fmt.predicateLabel + ': ' + fmt.valueLabel;
    _applyCtiBadgeClass(badge, tag);
    bindTagBadgeClick(badge);
    return badge;
  }

  async function refreshEventRowTags(uuid, sourceId) {
    var row = rows.find(function(r) { return r.dataset.uuid === uuid && r.dataset.sourceId === sourceId; });
    if (!row) return;
    var resp = await fetch(SCRIPT_ROOT + '/collection/' + encodeURIComponent(uuid) + '/preview?source=' + encodeURIComponent(sourceId));
    var data = await resp.json();
    if (!data.ok || !data.event) return;
    var tagNames = (data.event.tags || []).map(function(t) { return t.name; }).filter(Boolean);
    row.dataset.tags = JSON.stringify(tagNames);
    var ctiTags = tagNames.filter(function(t) { return t.startsWith('cti-evaluation:'); });
    var container = row.querySelector('.tag-cell-inner');
    if (!container && ctiTags.length) container = ensureCtiBadgeContainer(row);
    if (!container) { applyAll(); return; }
    var tagLine = container.querySelector('.tag-line');
    if (!tagLine) {
      tagLine = document.createElement('div');
      tagLine.className = 'tag-line';
      container.insertBefore(tagLine, container.firstChild);
    }
    tagLine.querySelectorAll('.tag-row-badge[data-tag^="cti-evaluation:"]').forEach(function(el) { el.remove(); });
    ctiTags.forEach(function(tag) { tagLine.appendChild(buildCtiBadge(tag)); });
    applyAll();
  }
  window.zsazsaRefreshCollectionEventRow = refreshEventRowTags;

  function _saveFilterState() {
    if (!_filterStatePersistReady) return;
    try {
      sessionStorage.setItem('zsazsa_filter_state', JSON.stringify({
        q: state.q,
        sortCol: state.sortCol,
        sortDir: state.sortDir,
        dateFilter: state.dateFilter,
        aiFilter: state.aiFilter,
        reportsFilter: state.reportsFilter,
        reqMatchFilter: state.reqMatchFilter,
        vulnFilter: state.vulnFilter,
        flagFilter: state.flagFilter,
        anyProductFilter: state.anyProductFilter,
        hideRejected: state.hideRejected,
        ctiPredicate: state.ctiPredicate,
        ctiOperator: state.ctiOperator,
        ctiValue: state.ctiValue,
        activeSources: Array.from(state.activeSources),
        include: Array.from(state.include),
        exclude: Array.from(state.exclude),
        includeOrgs: Array.from(state.includeOrgs),
        excludeOrgs: Array.from(state.excludeOrgs),
      }));
    } catch(e) {}
  }

  function applyAll() {
    var q = state.q.toLowerCase().trim();
    var visible = 0;
    var totalMatching = 0;
    // Events that exist for the user regardless of the discretionary filters,
    // i.e. excluding the ones the rejected-state mode hides. Used as the
    // "without filter" total and the per-source badge counts, so they stay
    // consistent with totalMatching (which also drops rejected events).
    var activeTotal = 0;
    var sourceActiveCounts = {};
    var todayStr = new Date().toISOString().slice(0, 10);
    var cutoffStr = state.dateFilter !== 'none' ? getDateCutoff(state.dateFilter) : '';

    rows.forEach(function(row) {
      var title = row.dataset.searchText || row.dataset.title || '';
      var tags = JSON.parse(row.dataset.tags || '[]');
      var tagSet = new Set(tags);
      var ctiMap = ctiEvalMap(tags);
      var srcId = row.dataset.sourceId || '';
      var orgc = row.dataset.orgc || '';
      var date = row.dataset.date || '';

      var rejectedHidden = state.hideRejected && tagSet.has('workflow:state="rejected"');
      if (!rejectedHidden) {
        activeTotal++;
        sourceActiveCounts[srcId] = (sourceActiveCounts[srcId] || 0) + 1;
      }

      var ok = true;
      if (!state.activeSources.has(srcId)) ok = false;
      if (ok && q && title.indexOf(q) === -1) ok = false;
      if (ok && rejectedHidden) ok = false;
      if (ok) state.include.forEach(function(t) { if (!tagSet.has(t)) ok = false; });
      if (ok) state.exclude.forEach(function(t) { if (tagSet.has(t)) ok = false; });
      if (ok && state.includeOrgs.size && !state.includeOrgs.has(orgc)) ok = false;
      if (ok && state.excludeOrgs.has(orgc)) ok = false;
      if (ok && state.flagFilter !== 'any') {
        var isFlagged = row.dataset.flagged === 'true';
        if (state.flagFilter === 'flagged' && !isFlagged) ok = false;
        if (state.flagFilter === 'not-flagged' && isFlagged) ok = false;
      }
      if (ok && state.pendingRejectUuids && !state.pendingRejectUuids.has(row.dataset.uuid || '')) ok = false;
      if (ok && state.aiFilter !== 'any') {
        var hasAi = row.dataset.hasAiSummary === '1';
        if (state.aiFilter === 'with' && !hasAi) ok = false;
        if (state.aiFilter === 'without' && hasAi) ok = false;
      }
      if (ok && state.reportsFilter !== 'any') {
        var repCount = parseInt(row.dataset.reportCount || '0', 10);
        if (state.reportsFilter === 'with' && repCount === 0) ok = false;
        if (state.reportsFilter === 'without' && repCount > 0) ok = false;
      }
      if (ok && state.reqMatchFilter !== 'any') {
        var hasReqMatch = row.dataset.hasReqMatch === '1';
        if (state.reqMatchFilter === 'with' && !hasReqMatch) ok = false;
        if (state.reqMatchFilter === 'without' && hasReqMatch) ok = false;
      }
      if (ok && state.vulnFilter !== 'any') {
        var hasVuln = row.dataset.hasVuln === '1';
        if (state.vulnFilter === 'with' && !hasVuln) ok = false;
        if (state.vulnFilter === 'without' && hasVuln) ok = false;
      }
      if (ok && state.anyProductFilter) {
        var hasProduct = tags.some(function(t) { return t.startsWith('zsazsa:product='); });
        if (!hasProduct) ok = false;
      }
      if (ok && state.ctiPredicate) {
        var rowValue = ctiMap[state.ctiPredicate] || '';
        if (state.ctiOperator === 'without') { if (rowValue) ok = false; }
        else if (state.ctiOperator === 'with') { if (!rowValue) ok = false; }
        else {
          if (!rowValue) { ok = false; }
          else {
            var rowRank = CTI_EVAL_RANK[rowValue] || 0;
            var targetRank = CTI_EVAL_RANK[state.ctiValue] || 0;
            if (state.ctiOperator === 'gte' && rowRank < targetRank) ok = false;
            if (state.ctiOperator === 'lte' && rowRank > targetRank) ok = false;
          }
        }
      }
      if (ok && cutoffStr) {
        if (state.dateFilter === 'today') { if (date !== todayStr) ok = false; }
        else if (state.dateFilter === 'older-48h' || state.dateFilter === 'older-7d') {
          if (!date || date >= cutoffStr) ok = false;
        }
        else { if (!date || date < cutoffStr) ok = false; }
      }
      if (ok) totalMatching++;
      // Record whether the row passes the filters before the display cap is
      // applied, so counts (e.g. the exclusion reject count) can be based on
      // the full matching set rather than just the rendered page.
      row.dataset.passesFilter = ok ? '1' : '0';
      if (ok && visible >= state.displayLimit) ok = false;
      row.style.display = ok ? '' : 'none';
      if (ok) visible++;

      row.querySelectorAll('.tag-row-badge').forEach(function(b) {
        var t = b.dataset.tag;
        b.classList.remove('tag-row-badge-include', 'tag-row-badge-exclude');
        if (state.include.has(t)) { b.classList.add('tag-row-badge-include'); return; }
        if (state.exclude.has(t)) { b.classList.add('tag-row-badge-exclude'); return; }
        if (t && t.startsWith('cti-evaluation:')) { _applyCtiBadgeClass(b, t); }
      });
    });

    var totalEl = document.getElementById('table-count');
    var pluralEl = document.getElementById('table-count-plural');
    var vcEl = document.getElementById('visible-count');
    if (totalEl) totalEl.textContent = totalMatching;
    if (pluralEl) pluralEl.textContent = totalMatching === 1 ? '' : 's';
    if (vcEl) vcEl.textContent = totalMatching;

    var visibleRows = rows.filter(function(r) { return r.style.display !== 'none'; });
    var totalReports = 0;
    var tagSet2 = new Set();
    visibleRows.forEach(function(r) {
      totalReports += parseInt(r.dataset.reportCount || '0', 10);
      try { (JSON.parse(r.dataset.tags || '[]')).forEach(function(t) { if (t) tagSet2.add(t); }); } catch(e) {}
    });
    var statReports = document.getElementById('stat-reports');
    var statTags = document.getElementById('stat-tags');
    if (statReports) statReports.textContent = totalReports;
    if (statTags) statTags.textContent = tagSet2.size;

    var totalNoteEl = document.getElementById('total-count-note');
    if (totalNoteEl) totalNoteEl.textContent = 'of ' + totalMatching + ' matching';

    var ofTotalEl = document.getElementById('table-count-of-total');
    if (ofTotalEl) {
      if (totalMatching < activeTotal) {
        ofTotalEl.textContent = '(' + activeTotal + ' without filter)';
        ofTotalEl.style.display = '';
      } else { ofTotalEl.style.display = 'none'; }
    }

    // Keep each source badge in sync with its active (non-rejected) event count,
    // so rejecting an event updates the badge without a reload. Error sources
    // show a warning badge instead of a count and are left untouched.
    document.querySelectorAll('#style-current .source-toggle').forEach(function(toggle) {
      var badge = toggle.querySelector('.source-toggle-badge.text-bg-light');
      if (badge) badge.textContent = sourceActiveCounts[toggle.dataset.sourceId] || 0;
    });

    var loadMoreContainer = document.getElementById('load-more-container');
    var loadMoreHint = document.getElementById('load-more-hint');
    if (loadMoreContainer) {
      var remaining = totalMatching - visible;
      loadMoreContainer.style.display = remaining > 0 ? '' : 'none';
      if (loadMoreHint) loadMoreHint.textContent = remaining + ' more event' + (remaining !== 1 ? 's' : '') + ' match your current filters';
    }

    var hasFilter = q || state.include.size || state.exclude.size ||
      state.activeSources.size < allSourceIds.length ||
      state.includeOrgs.size || state.excludeOrgs.size || !state.hideRejected ||
      state.flagFilter !== 'any' || !!state.pendingRejectUuids ||
      state.dateFilter !== 'none' || state.aiFilter !== 'any' || state.reportsFilter !== 'any' ||
      state.reqMatchFilter !== 'any' || state.vulnFilter !== 'any' ||
      state.anyProductFilter || !!state.ctiPredicate;
    var clearBtn = document.getElementById('clear-filters-btn');

    _saveFilterState();

      srcDdBtn.classList.toggle('btn-primary', !allOn);
      srcDdBtn.classList.toggle('btn-outline-secondary', allOn);

  function sortRows() {
    if (!rows.length) return;
    var tbody = document.getElementById('events-tbody');
    var col = state.sortCol;
    var dir = state.sortDir === 'asc' ? 1 : -1;
    rows.sort(function(a, b) {

      else if (col === 'orgc') { va = (a.dataset.orgc || '').toLowerCase(); vb = (b.dataset.orgc || '').toLowerCase(); }
      else { va = a.dataset.title || ''; vb = b.dataset.title || ''; }
      return va < vb ? -dir : va > vb ? dir : 0;
    });
    rows.forEach(function(r) { tbody.appendChild(r); });
    document.querySelectorAll('.sort-btn').forEach(function(btn) {
      var active = btn.dataset.col === col;
      btn.classList.toggle('active', active);
      var icon = btn.querySelector('.sort-icon');

      icon.className = 'fas ms-1 sort-icon ' + (active ? (state.sortDir === 'asc' ? 'fa-arrow-up' : 'fa-arrow-down') : 'fa-sort text-muted');
    });
    var thIcons = {date:'th-date-icon', title:'th-title-icon', orgc:'th-orgc-icon'};
    Object.keys(thIcons).forEach(function(c) {
      var el = document.getElementById(thIcons[c]);

      el.className = 'fas ms-1 small sort-th-icon ' + (c === col

    var ctiPredicateFilter = document.getElementById('cti-predicate-filter');

    var active = state.includeOrgs.size + state.excludeOrgs.size;

  /* ── CTI eval filter (list page filter controls, not the tagging modal) ── */
  var ctiPredicateFilter = document.getElementById('cti-predicate-filter');
  var ctiOperatorFilter = document.getElementById('cti-operator-filter');
  var ctiValueFilter = document.getElementById('cti-value-filter');
  var ctiPresetBtns = document.querySelectorAll('.cti-preset-btn');
  var ctiPresetClearBtn = document.getElementById('cti-preset-clear');

  function syncCtiFilterUi() {
    var predicateActive = !!state.ctiPredicate;
    if (ctiOperatorFilter) ctiOperatorFilter.disabled = !predicateActive;
    if (ctiValueFilter) {
      var thresholdMode = state.ctiOperator === 'gte' || state.ctiOperator === 'lte';
      ctiValueFilter.disabled = !predicateActive || !thresholdMode;
    }
    ctiPresetBtns.forEach(function(btn) {
      var pred = btn.dataset.predicate || '';
      var op = btn.dataset.operator || 'gte';
      var val = btn.dataset.value || '';
      var active = state.ctiPredicate === pred && state.ctiOperator === op &&
        ((op === 'gte' || op === 'lte') ? state.ctiValue === val : true);
      btn.classList.toggle('btn-secondary', active); btn.classList.toggle('btn-outline-secondary', !active);
    });
  }

  function applyCtiFilter(predicate, operator, value) {
    state.ctiPredicate = predicate || ''; state.ctiOperator = operator || 'gte';
    if (value) state.ctiValue = value;
    if (ctiPredicateFilter) ctiPredicateFilter.value = state.ctiPredicate;
    if (ctiOperatorFilter) ctiOperatorFilter.value = state.ctiOperator;
    if (ctiValueFilter) ctiValueFilter.value = state.ctiValue;
    syncCtiFilterUi(); applyAll();
  }

  if (ctiPredicateFilter) ctiPredicateFilter.addEventListener('change', function() { state.ctiPredicate = ctiPredicateFilter.value || ''; syncCtiFilterUi(); applyAll(); });
  if (ctiOperatorFilter) ctiOperatorFilter.addEventListener('change', function() { state.ctiOperator = ctiOperatorFilter.value || 'gte'; syncCtiFilterUi(); applyAll(); });

  /* ── Event preview offcanvas ── */
  var previewOffcanvasEl = document.getElementById('event-preview-offcanvas');
  var previewOffcanvas = previewOffcanvasEl ? new bootstrap.Offcanvas(previewOffcanvasEl) : null;
  var previewTitle = document.getElementById('event-preview-title');
  var previewMeta = document.getElementById('event-preview-meta');
  var previewContent = document.getElementById('event-preview-content');
  var previewLoading = document.getElementById('event-preview-loading');
  var previewDetailLink = document.getElementById('event-preview-detail-link');
  var previewCache = {};

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  function previewMetaText(data) {
    var ev = data.event || {};
    var parts = [];
    if (ev.date) parts.push(ev.date);
    if (data.source_label) parts.push(data.source_label);
    var attrCount = (ev.attributes || []).length;
    var objCount = (ev.objects || []).length;
    parts.push(attrCount + ' attribute' + (attrCount === 1 ? '' : 's'));
    parts.push(objCount + ' object' + (objCount === 1 ? '' : 's'));
    return parts.join(' · ');
  }

  function renderPreview(data) {
    if (!previewContent) return;
    var ev = data.event; var html = '';
    if (ev.tags && ev.tags.length) {
      html += '<div class="mb-3 d-flex flex-wrap gap-1">';
      ev.tags.forEach(function(t) { html += '<span class="badge" style="background:' + (t.colour||'var(--chip-tag-generic-fg)') + ';font-size:.72rem;">' + esc(t.name||t) + '</span>'; });
      html += '</div>';
    }
    if (data.reports && data.reports.length) {
      html += '<div class="mb-3"><h6 class="small fw-semibold text-muted mb-2"><i class="fas fa-file-lines me-1"></i>Reports (' + data.reports.length + ')</h6>';
      html += '<div class="accordion" id="preview-reports-acc">';
      data.reports.forEach(function(r, i) {
        html += '<div class="accordion-item border-0 ' + (i>0?'border-top':'') + '">';
        html += '<h2 class="accordion-header"><button class="accordion-button ' + (i>0?'collapsed':'') + ' py-2 small" type="button" data-bs-toggle="collapse" data-bs-target="#prev-rep-' + i + '" aria-expanded="' + (i===0?'true':'false') + '">' + esc(r.name) + '</button></h2>';
        html += '<div id="prev-rep-' + i + '" class="accordion-collapse collapse ' + (i===0?'show':'') + '" data-bs-parent="#preview-reports-acc">';
        html += '<div class="accordion-body pt-1 pb-2"><div class="report-md-body small" data-md="' + escAttr(r.content) + '"></div></div></div></div>';
      });
      html += '</div></div>';
    }
    if (ev.attributes && ev.attributes.length) {
      html += '<div class="mb-3"><h6 class="small fw-semibold text-muted mb-2"><i class="fas fa-list me-1"></i>Attributes (' + ev.attributes.length + ')</h6>';
      html += '<div style="max-height:16rem;overflow-y:auto;"><table class="table table-sm table-hover mb-0" style="font-size:.78rem;">';
      ev.attributes.forEach(function(a) {
        html += '<tr><td class="text-muted pe-2" style="white-space:nowrap;">' + esc(a.category) + '</td>';
        html += '<td class="font-monospace text-muted pe-2" style="white-space:nowrap;font-size:.7rem;">' + esc(a.type) + '</td>';
        html += '<td class="font-monospace" style="word-break:break-all;">' + esc(a.value) + '</td>';
        if (a.comment) html += '<td class="text-muted" style="font-size:.72rem;">' + esc(a.comment) + '</td>';
        html += '</tr>';
      });
      html += '</table></div></div>';
    }
    if (ev.objects && ev.objects.length) {
      html += '<div class="mb-3"><h6 class="small fw-semibold text-muted mb-2"><i class="fas fa-cube me-1"></i>Objects (' + ev.objects.length + ')</h6>';
      html += '<div class="accordion" id="preview-objs-acc">';
      ev.objects.forEach(function(obj, i) {
        html += '<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed py-1 small" type="button" data-bs-toggle="collapse" data-bs-target="#prev-obj-' + i + '">' + esc(obj.name) + '</button></h2>';
        html += '<div id="prev-obj-' + i + '" class="accordion-collapse collapse" data-bs-parent="#preview-objs-acc"><div class="accordion-body py-1">';
        html += '<table class="table table-sm mb-0" style="font-size:.76rem;">';
        (obj.attributes||[]).forEach(function(a) { html += '<tr><td class="text-muted pe-2" style="white-space:nowrap;">' + esc(a.relation) + '</td><td class="font-monospace" style="word-break:break-all;">' + esc(a.value) + '</td></tr>'; });
        html += '</table></div></div></div>';
      });
      html += '</div></div>';
    }
    if (!html) html = '<p class="text-muted small">No reports, attributes, or objects found.</p>';
    previewContent.innerHTML = html;
    previewContent.querySelectorAll('.report-md-body[data-md]').forEach(function(el) {
      var raw = el.getAttribute('data-md') || '';
      el.innerHTML = raw.trim() ? (window.DOMPurify ? DOMPurify.sanitize(marked.parse(raw)) : marked.parse(raw)) : '<em class="text-muted">No content.</em>';
      el.removeAttribute('data-md');
    });
  }

  function openPreview(uuid, sourceId) {
    if (!previewOffcanvas) return;
    var cacheKey = uuid + '|' + sourceId;
    if (previewTitle) previewTitle.textContent = '…';
    if (previewMeta) previewMeta.textContent = '';
    if (previewContent) previewContent.innerHTML = '';
    if (previewLoading) previewLoading.classList.remove('d-none');
    previewOffcanvas.show();
    if (previewCache[cacheKey]) {
      if (previewLoading) previewLoading.classList.add('d-none');
      var cached = previewCache[cacheKey];
      if (previewTitle) previewTitle.textContent = cached.event.info || '(untitled)';
      if (previewMeta) previewMeta.textContent = previewMetaText(cached);
      if (previewDetailLink) previewDetailLink.href = cached.detail_url;
      renderPreview(cached); return;
    }
    fetch(SCRIPT_ROOT + '/collection/' + uuid + '/preview?source=' + encodeURIComponent(sourceId))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (previewLoading) previewLoading.classList.add('d-none');
        if (!data.ok) { if (previewContent) previewContent.innerHTML = '<p class="text-danger small">' + esc(data.error || 'Could not load event') + '</p>'; return; }
        previewCache[cacheKey] = data;
        if (previewTitle) previewTitle.textContent = data.event.info || '(untitled)';
        if (previewMeta) previewMeta.textContent = previewMetaText(data);
        if (previewDetailLink) previewDetailLink.href = data.detail_url;
        renderPreview(data);
      })
      .catch(function() {
        if (previewLoading) previewLoading.classList.add('d-none');
        if (previewContent) previewContent.innerHTML = '<p class="text-danger small">Request failed.</p>';
      });
  }

  document.querySelectorAll('.event-preview-link').forEach(function(a) {
    a.addEventListener('click', function(e) { e.preventDefault(); openPreview(a.dataset.uuid, a.dataset.sourceId); });
  });

  /* ── Reports cell: clicking the report count opens the preview offcanvas,
        which already shows the reports as its first section. ── */
  document.querySelectorAll('.reports-cell-link').forEach(function(a) {

  /* ── Flag for review ── */
  document.querySelectorAll('.flag-review-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uuid = btn.dataset.uuid; var sourceId = btn.dataset.sourceId;
      btn.disabled = true;
      fetch(SCRIPT_ROOT + '/collection/' + uuid + '/flag', {

  /* ── Reject event (set workflow:state="rejected") ── */
  var REJECTED_TAG = 'workflow:state="rejected"';

  function showFeedback(message, category) {
    /* Append a dismissible alert to #flash-container; reuse auto-dismiss logic from base.html */
    var container = document.getElementById('flash-container');
    if (!container) { return; }
    var cls = category === 'success' ? 'alert-success'
            : category === 'danger'  ? 'alert-danger'
            : category === 'warning' ? 'alert-warning'
            : 'alert-info';
    var icon = category === 'success' ? 'fa-check-circle'
             : category === 'danger'  ? 'fa-triangle-exclamation'
             : category === 'warning' ? 'fa-triangle-exclamation'
             : 'fa-circle-info';
    var el = document.createElement('div');
    el.className = 'alert ' + cls + ' alert-dismissible fade show alert-flash';
    el.setAttribute('role', 'alert');
    el.innerHTML = '<i class="fas ' + icon + ' me-2"></i>' +
                   '<span class="alert-text"></span>' +
                   '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>';
    el.querySelector('.alert-text').textContent = message;
    container.appendChild(el);
    setTimeout(function() {
      try { (new bootstrap.Alert(el)).close(); } catch (e) { el.remove(); }
    }, 4000);
  }

  function updateRowRejectedState(row, rejected) {
    if (!row) return;
    row.classList.toggle('wf-rejected-row', rejected);

    /* Keep data-tags in sync so existing filters (hideRejected etc.) work without reload */
    var tags = [];
    try { tags = JSON.parse(row.dataset.tags || '[]'); } catch (e) { tags = []; }
    var hasTag = tags.indexOf(REJECTED_TAG) !== -1;
    if (rejected && !hasTag) tags.push(REJECTED_TAG);
    if (!rejected && hasTag) tags = tags.filter(function(t) { return t !== REJECTED_TAG; });
    row.dataset.tags = JSON.stringify(tags);

    /* Toggle the small ban icon next to the title */
    var titleCell = row.querySelector('td:nth-child(4)');
    if (titleCell) {
      var marker = titleCell.querySelector('.reject-state-marker');
      if (rejected && !marker) {
        marker = document.createElement('i');
        marker.className = 'fas fa-ban ms-1 reject-state-marker';
        marker.style.cssText = 'font-size:.6rem;color:var(--neutral-500);cursor:default;vertical-align:middle;';
        marker.title = 'Grayed out: workflow state is rejected';
        var firstLink = titleCell.querySelector('a.event-preview-link');
        if (firstLink && firstLink.nextSibling) {
          titleCell.insertBefore(marker, firstLink.nextSibling);
        } else {
          titleCell.appendChild(marker);
        }
      } else if (!rejected && marker) {
        marker.remove();
      }
    }
  }

  document.querySelectorAll('.reject-event-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uuid = btn.dataset.uuid;
      var sourceId = btn.dataset.sourceId;

      if (!confirm('Reject this event?\n\nThis sets workflow:state="rejected" in MISP. The event will be greyed out and excluded from product workflows. To restore it, change the workflow state directly in MISP.')) {
        return;
      }

      btn.disabled = true;
      var originalHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

      fetch(SCRIPT_ROOT + '/collection/' + uuid + '/reject', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
        body: JSON.stringify({source: sourceId}),
      })
      .then(function(r) { return r.json().then(function(d) { return {status: r.status, body: d}; }); })
      .then(function(resp) {
        var data = resp.body || {};
        if (!data.ok) {
          btn.disabled = false;
          btn.innerHTML = originalHtml;
          showFeedback(data.error || 'Could not update event state.', 'danger');
          return;
        }
        /* Event left the 'incomplete' state, hide the button for this row */
        var row = btn.closest('tr.event-row');
        updateRowRejectedState(row, !!data.rejected);
        btn.remove();
        showFeedback(data.message || 'Event rejected.', 'warning');
        applyAll();
      })
      .catch(function() {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        showFeedback('Request failed. The event state was not changed.', 'danger');
      });
    });
  });

  /* ── Bulk actions on selected events (toolbar in the table header) ── */
  var selectionToolbar = document.getElementById('selection-actions-toolbar');
  var selectionActionsGear = document.getElementById('selection-actions-gear');

  function updateSelectionToolbar() {
    var anySelected = !!document.querySelector('.event-row-cb:checked');
    if (selectionToolbar) selectionToolbar.style.display = anySelected ? 'inline-flex' : 'none';
    if (selectionActionsGear) selectionActionsGear.style.display = anySelected ? 'none' : 'inline';
  }
  document.querySelectorAll('.event-row-cb').forEach(function(cb) { cb.addEventListener('change', updateSelectionToolbar); });
  if (selectAllCb) selectAllCb.addEventListener('change', updateSelectionToolbar);
  updateSelectionToolbar();

  function runBulkAction(btn, url, confirmMessage, onDone) {
    var selected = getSelectedEvents();
    if (!selected.length) { alert('Select at least one event using the checkboxes.'); return; }
    if (confirmMessage && !confirm(confirmMessage)) { return; }

    btn.disabled = true;
    var originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
      body: JSON.stringify({events: selected}),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.innerHTML = originalHtml;
      if (!data.ok) {
        showFeedback(data.error || 'Bulk action failed.', 'danger');
        return;
      }
      showFeedback(data.message || 'Done.', 'success');
      if (onDone) onDone(selected);
    })
    .catch(function() {
      btn.disabled = false;
      btn.innerHTML = originalHtml;
      showFeedback('Request failed. No changes were made.', 'danger');
    });
  }

  function findEventRow(uuid, sourceId) {
    var selector = 'tr.event-row[data-uuid="' + uuid + '"]';
    if (sourceId) selector += '[data-source-id="' + sourceId + '"]';
    return document.querySelector(selector);
  }

  var selectionFlagBtn = document.getElementById('selection-flag-btn');
  if (selectionFlagBtn) {
    selectionFlagBtn.addEventListener('click', function() {
      runBulkAction(selectionFlagBtn, SCRIPT_ROOT + '/collection/bulk-flag', null, function(selected) {
        selected.forEach(function(s) {
          var row = findEventRow(s.uuid, s.sourceId);
          if (!row) return;
          row.dataset.flagged = 'true';
          var flagBtn = row.querySelector('.flag-review-btn');
          if (flagBtn) {
            flagBtn.dataset.flagged = 'true';
            flagBtn.classList.add('btn-warning');
            flagBtn.classList.remove('btn-outline-warning');
            flagBtn.title = 'Remove follow-up flag';
          }
        });
        applyAll();
      });
    });
  }

  var selectionRejectBtn = document.getElementById('selection-reject-btn');
  if (selectionRejectBtn) {
    selectionRejectBtn.addEventListener('click', function() {
      runBulkAction(
        selectionRejectBtn,
        SCRIPT_ROOT + '/collection/bulk-reject',
        'Reject the selected events?\n\nThis sets workflow:state="rejected" in MISP for each one. They will be greyed out and excluded from product workflows. To restore them, change the workflow state directly in MISP.',
        function(selected) {
          selected.forEach(function(s) {
            var row = findEventRow(s.uuid, s.sourceId);
            if (!row) return;
            updateRowRejectedState(row, true);
            var rejectBtn = row.querySelector('.reject-event-btn');
            if (rejectBtn) rejectBtn.remove();
            var cb = row.querySelector('.event-row-cb');
            if (cb) cb.checked = false;
          });
          if (selectAllCb) selectAllCb.checked = false;
          applyAll();
          updateSelectionToolbar();
          updateCreateProductBtn();
        }
      );
    });
  }

  var selectionSummariseBtn = document.getElementById('selection-summarise-btn');
  if (selectionSummariseBtn) {
    selectionSummariseBtn.addEventListener('click', function() {
      runBulkAction(
        selectionSummariseBtn,
        SCRIPT_ROOT + '/collection/bulk-summarise',
        'Generate AI summaries for the selected events?\n\nThis only applies to scraper events that do not yet have a summary; the rest are skipped.',
        function() {
          setTimeout(function() { window.location.reload(); }, 1200);
        }
      );
    });
  }

  /* ── Export state and applyAll for tab-based variants ── */
  window.zsazsaCollectionState = state;
  window.zsazsaCollectionApply = applyAll;
  window.zsazsaClearAllFilters = clearAllFilters;

  /* ── Restore a serialised filter preset ── */
  window.zsazsaRestoreFilterState = function(saved) {
    if (!saved || typeof saved !== 'object') return;
    clearAllFilters();

    /* Scalars */
    if (saved.q !== undefined) state.q = saved.q;
    if (saved.sortCol) state.sortCol = saved.sortCol;
    if (saved.sortDir) state.sortDir = saved.sortDir;
    if (saved.dateFilter) state.dateFilter = saved.dateFilter;
    if (saved.aiFilter) state.aiFilter = saved.aiFilter;
    if (saved.reportsFilter) state.reportsFilter = saved.reportsFilter;
    if (saved.reqMatchFilter) state.reqMatchFilter = saved.reqMatchFilter;
    if (saved.vulnFilter) state.vulnFilter = saved.vulnFilter;
    if (saved.flagFilter) state.flagFilter = saved.flagFilter;
    if (saved.anyProductFilter !== undefined) state.anyProductFilter = !!saved.anyProductFilter;
    if (saved.hideRejected !== undefined) state.hideRejected = !!saved.hideRejected;
    if (saved.ctiPredicate !== undefined) state.ctiPredicate = saved.ctiPredicate;
    if (saved.ctiOperator) state.ctiOperator = saved.ctiOperator;
    if (saved.ctiValue) state.ctiValue = saved.ctiValue;

    /* Sets — validate sources against what still exists */
    state.include = new Set(saved.include || []);
    state.exclude = new Set(saved.exclude || []);
    var savedSources = (saved.activeSources || []).filter(function(s) { return allSourceIds.indexOf(s) !== -1; });
    state.activeSources = savedSources.length ? new Set(savedSources) : new Set(allSourceIds);
    state.includeOrgs = new Set(saved.includeOrgs || []);
    state.excludeOrgs = new Set(saved.excludeOrgs || []);

    /* Sync search box */
    var si = document.getElementById('search-input');
    var sc = document.getElementById('search-clear');
    if (si) si.value = state.q;
    if (sc) sc.style.display = state.q ? '' : 'none';

    /* Sync date buttons */
    document.querySelectorAll('.date-filter-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.dateFilter === state.dateFilter);
    });

    /* Sync source checkboxes + toggles */
    document.querySelectorAll('#source-cb-container .source-cb').forEach(function(cb) {
      cb.checked = state.activeSources.has(cb.value);
    });
    sessionStorage.setItem('zsazsa_active_sources', JSON.stringify(Array.from(state.activeSources)));
    syncAllSourceVisuals();

    /* Sync tag pills */
    document.querySelectorAll('.tag-pill:not(.org-pill)').forEach(function(pill) {
      var tag = pill.dataset.tag || '';
      var isMeta = CLOUD_HIDDEN_PREFIXES.some(function(p) { return tag.startsWith(p); });
      if (state.include.has(tag)) {
        pill.dataset.state = 'include'; pill.className = 'tag-pill tag-pill-include' + (isMeta ? ' tag-pill-hidden' : '');
      } else if (state.exclude.has(tag)) {
        pill.dataset.state = 'exclude'; pill.className = 'tag-pill tag-pill-exclude' + (isMeta ? ' tag-pill-hidden' : '');
      } else {
        pill.dataset.state = 'neutral'; pill.className = 'tag-pill tag-pill-neutral' + (isMeta ? ' tag-pill-hidden' : '');
      }
    });

    /* Sync org pills */
    document.querySelectorAll('.org-pill').forEach(function(pill) {
      var org = pill.dataset.org || '';
      if (state.includeOrgs.has(org)) {
        pill.dataset.state = 'include'; pill.className = 'tag-pill tag-pill-include org-pill';
      } else if (state.excludeOrgs.has(org)) {
        pill.dataset.state = 'exclude'; pill.className = 'tag-pill tag-pill-exclude org-pill';
      } else {
        pill.dataset.state = 'neutral'; pill.className = 'tag-pill tag-pill-neutral org-pill';
      }
    });

    /* Sync tristate buttons */
    document.querySelectorAll('.tristate-filter-btn').forEach(function(b) {
      var key = b.dataset.filterKey; var val = b.dataset.filterValue;
      if (!key) return;
      b.classList.toggle('btn-secondary', state[key] === val);
      b.classList.toggle('btn-outline-secondary', state[key] !== val);
    });

    /* Sync CTI dropdowns */
    var ctiPredEl = document.getElementById('cti-predicate-filter');
    var ctiOpEl   = document.getElementById('cti-operator-filter');
    var ctiValEl  = document.getElementById('cti-value-filter');
    if (ctiPredEl) ctiPredEl.value = state.ctiPredicate;
    if (ctiOpEl)   ctiOpEl.value   = state.ctiOperator;
    if (ctiValEl)  ctiValEl.value  = state.ctiValue;
    syncCtiFilterUi();

    sortRows();
    updateTagSummary(); updateTagCountLabel();
    updateOrgSummary(); updateOrgCountLabel(); updateOrgPillVisibility();
    applyAll();
  };

  /* ── Restore full filter state on page load ── */
  (function() {
    var raw = sessionStorage.getItem('zsazsa_filter_state');
    if (raw) {
      try { window.zsazsaRestoreFilterState(JSON.parse(raw)); } catch(e) {}
    } else {
      /* Fallback: legacy source-only key */
      var legacySources = sessionStorage.getItem('zsazsa_active_sources');
      if (legacySources) {
        try {
          var saved = new Set(JSON.parse(legacySources));
          var valid = new Set(allSourceIds.filter(function(id) { return saved.has(id); }));
          state.activeSources = valid.size ? valid : new Set(allSourceIds);
          document.querySelectorAll('#source-cb-container .source-cb').forEach(function(cb) {
            cb.checked = state.activeSources.has(cb.value);
          });
          syncAllSourceVisuals();
          applyAll();
        } catch(e) {}
      }
    }
    _filterStatePersistReady = true;
    _saveFilterState();
  })();

})();

/* ── Pull event modal ── */
(function() {
  var csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
  var modal = document.getElementById('pull-event-modal');
  var btn = document.getElementById('pull-confirm-btn');
  var uuidInput = document.getElementById('pull-uuid-input');
  var sourceSelect = document.getElementById('pull-source-select');
  var resultDiv = document.getElementById('pull-result');
  var okDiv = document.getElementById('pull-result-ok');
  var errDiv = document.getElementById('pull-result-err');
  var okMsg = document.getElementById('pull-result-ok-msg');
  var errMsg = document.getElementById('pull-result-err-msg');
  if (!btn) return;

  function resetResult() { resultDiv.classList.add('d-none'); okDiv.classList.add('d-none'); errDiv.classList.add('d-none'); }

  modal.addEventListener('show.bs.modal', function() { resetResult(); uuidInput.value = ''; btn.disabled = false; btn.innerHTML = '<i class="fas fa-cloud-arrow-down me-1"></i>Pull'; });

  btn.addEventListener('click', function() {
    var uuid = uuidInput.value.trim();
    if (!uuid) { uuidInput.focus(); return; }
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Pulling…'; resetResult();
    fetch(SCRIPT_ROOT + '/collection/pull', {
      method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':csrfToken},
      body:JSON.stringify({uuid:uuid, source_id:sourceSelect.value}),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-cloud-arrow-down me-1"></i>Pull';
      resultDiv.classList.remove('d-none');
      if (data.ok) {
        okMsg.textContent = data.message || 'Event pulled into cache.'; okDiv.classList.remove('d-none');
        setTimeout(function() { window.location.reload(); }, 1200);
      } else { errMsg.textContent = data.error || 'Unknown error.'; errDiv.classList.remove('d-none'); }
    })
    .catch(function() {
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-cloud-arrow-down me-1"></i>Pull';
      resultDiv.classList.remove('d-none'); errMsg.textContent = 'Request failed.'; errDiv.classList.remove('d-none');
    });
  });
})();

/* ── CTI Evaluation inline panel ── */
(function() {
  var PREDS = [
    ['overall-score',       'Overall Score',       'Composite quality rating across all dimensions'],
    ['accuracy',            'Accuracy',            'Factual correctness, absence of errors'],
    ['clarity',             'Clarity',             'Readability and ease of understanding'],
    ['specificity',         'Specificity',         'Technical detail and actionable depth'],
    ['relevance',           'Relevance',           'Alignment with your threat landscape'],
    ['timeliness',          'Timeliness',          'Currency and actionability'],
    ['usefulness',          'Usefulness',          'Practical operational value'],
    ['confidence',          'Confidence',          'Analytical confidence in the assessment'],
    ['source-reliability',  'Source Reliability',  'Trustworthiness of the originating source'],
    ['evidence-strength',   'Evidence Strength',   'Quality of evidence supporting claims'],
    ['format-validity',     'Format Validity',     'Structural correctness of the MISP data'],
    ['conversion-fidelity', 'Conversion Fidelity', 'Accuracy of data transformation from source'],
  ];
  var VALUES = ['very-low', 'low', 'moderate', 'high', 'very-high'];
  var VALUE_LABELS = {'very-low':'Very Low','low':'Low','moderate':'Moderate','high':'High','very-high':'Very High'};
  var csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
  var openPanel = null;

  function closePanel() {
    if (!openPanel) return;
    openPanel.panelRow.remove();
    openPanel.btn.classList.remove('active');
    openPanel = null;
  }

  function buildPanelRow(title) {
    var predsHtml = PREDS.map(function(p) {
      var opts = '<option value="">Not set</option>';
      VALUES.forEach(function(v) { opts += '<option value="' + v + '">' + VALUE_LABELS[v] + '</option>'; });
      return '<div class="cti-pred-item">'
        + '<div class="cti-pred-label"><span class="fw-semibold small">' + p[1] + '</span>'
        + '<span class="text-muted cti-pred-desc">' + p[2] + '</span></div>'
        + '<select class="form-select form-select-sm cti-eval-select" data-predicate="' + p[0] + '">' + opts + '</select>'
        + '</div>';
    }).join('');

    var tr = document.createElement('tr');
    tr.className = 'cti-eval-panel-row';
    var td = document.createElement('td');
    td.colSpan = 9;
    td.innerHTML =
      '<div class="cti-eval-panel-container">'
        + '<div class="cti-eval-panel-header">'
          + '<i class="fas fa-microscope text-primary" style="font-size:.85rem;"></i>'
          + '<span class="cti-eval-panel-title">CTI Evaluation</span>'
          + '<span class="cti-eval-panel-event-name">' + (title || '(untitled)') + '</span>'
          + '<button type="button" class="cti-eval-panel-close" title="Close">&times;</button>'
        + '</div>'
        + '<p class="text-muted small mb-2 mt-1">Rate using the CTI Evaluation taxonomy. Tags are applied directly to the MISP event. Leave any predicate at <em>Not set</em> to skip it.</p>'
        + '<div class="cti-eval-predicates">' + predsHtml + '</div>'
        + '<div class="cti-eval-panel-feedback d-none">'
          + '<div class="cti-eval-panel-ok alert alert-success py-2 small d-none mb-0"></div>'
          + '<div class="cti-eval-panel-err alert alert-danger py-2 small d-none mb-0"></div>'
        + '</div>'
        + '<div class="mt-2">'
          + '<button type="button" class="btn btn-sm btn-primary cti-eval-panel-submit">'
            + '<i class="fas fa-tag me-1"></i>Apply tags to MISP'
          + '</button>'
        + '</div>'
      + '</div>';
    tr.appendChild(td);
    return tr;
  }

  document.querySelectorAll('.cti-eval-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uuid = btn.dataset.uuid; var sourceId = btn.dataset.sourceId;
      if (openPanel && openPanel.btn === btn) { closePanel(); return; }
      closePanel();
      var eventRow = btn.closest('tr');
      if (!eventRow) return;
      var panelRow = buildPanelRow(btn.dataset.title);
      eventRow.insertAdjacentElement('afterend', panelRow);
      btn.classList.add('active');
      openPanel = {btn: btn, panelRow: panelRow, uuid: uuid, sourceId: sourceId};

      panelRow.querySelector('.cti-eval-panel-close').addEventListener('click', closePanel);

      var submitBtn = panelRow.querySelector('.cti-eval-panel-submit');
      submitBtn.addEventListener('click', function() {
        var pairs = [];
        panelRow.querySelectorAll('.cti-eval-select').forEach(function(s) { if (s.value) pairs.push({predicate:s.dataset.predicate, value:s.value}); });
        var feedbackEl = panelRow.querySelector('.cti-eval-panel-feedback');
        var okEl = panelRow.querySelector('.cti-eval-panel-ok');
        var errEl = panelRow.querySelector('.cti-eval-panel-err');
        if (!pairs.length) {
          feedbackEl.classList.remove('d-none');
          errEl.textContent = 'Select at least one predicate value before applying.';
          errEl.classList.remove('d-none'); okEl.classList.add('d-none'); return;
        }
        submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Applying…';
        feedbackEl.classList.add('d-none');
        var index = 0; var errors = [];
        function next() {
          if (index >= pairs.length) {
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-tag me-1"></i>Apply tags to MISP';
            feedbackEl.classList.remove('d-none');
            if (errors.length) {
              errEl.textContent = 'Some tags failed: ' + errors.join('; ');
              errEl.classList.remove('d-none'); okEl.classList.add('d-none');
            } else {
              okEl.textContent = pairs.length + ' tag' + (pairs.length !== 1 ? 's' : '') + ' applied to MISP.';
              okEl.classList.remove('d-none'); errEl.classList.add('d-none');
              var refreshPromise = Promise.resolve();
              if (window.zsazsaRefreshCollectionEventRow && uuid && sourceId)
                refreshPromise = window.zsazsaRefreshCollectionEventRow(uuid, sourceId);
              refreshPromise.catch(function(){}).finally(closePanel);
            }
            return;
          }
          var pair = pairs[index++];
          fetch(SCRIPT_ROOT + '/collection/' + uuid + '/cti-tag', {
            method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':csrfToken},
            body:JSON.stringify({predicate:pair.predicate, value:pair.value, source:sourceId}),
          })
          .then(function(r) { return r.json(); })
          .then(function(data) { if (!data.ok) errors.push(pair.predicate + ': ' + (data.error||'failed')); next(); })
          .catch(function() { errors.push(pair.predicate + ': request failed'); next(); });
        }
        next();
      });
    });
  });
})();
</script>
